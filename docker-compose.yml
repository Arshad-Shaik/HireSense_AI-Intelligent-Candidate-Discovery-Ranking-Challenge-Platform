# hiresense-ai/docker-compose.yml
# ============================================================
# HireSense_AI — Docker Compose
# Services: backend + sandbox
# ============================================================

version: "3.9"

services:

  # ── Go Backend API ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: hiresense-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - CSV_PATH=./outputs/HireSense_AI.csv
      - ALLOW_ORIGIN=*
    volumes:
      - ./outputs:/app/outputs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-",
             "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Gradio Sandbox ──────────────────────────────────────
  sandbox:
    build:
      context: .
      dockerfile: docker/sandbox/Dockerfile
    container_name: hiresense-sandbox
    ports:
      - "7860:7860"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    volumes:
      - ./outputs:/app/outputs:ro
    restart: unless-stopped
    depends_on:
      - backend

networks:
  default:
    name: hiresense-network