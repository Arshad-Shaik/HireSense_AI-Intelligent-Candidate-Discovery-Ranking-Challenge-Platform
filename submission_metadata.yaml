ai_usage_summary: |
  Used Claude & ChatGPT for architecture discussion, code review,
  and debugging assistance. All engineering decisions,
  design choices, and implementation were made by the
  team. No candidate data was fed to any LLM.

methodology_summary: |
  HireSense_AI uses BAAI/bge-small-en-v1.5 embeddings
  stored in ChromaDB for semantic retrieval of top 30K
  candidates from a 100K pool. A dynamic domain filter
  using JD vocabulary overlap and weighted domain scoring
  eliminates non-technical profiles. Multi-signal ranking
  combines semantic similarity (70%), skill alignment
  (12%), experience (8%), profile quality (4%), behavior
  (3%), and trust (3%). All 23 Redrob behavioral signals
  are utilized including GitHub activity, skill assessment
  scores, and recruiter engagement metrics. The system
  naturally avoids honeypots through semantic and
  vocabulary-based filtering without hardcoded rules.

